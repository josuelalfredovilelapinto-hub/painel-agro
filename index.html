<script>

const CONFIG = {

    API_KEY: 'SUA_API_KEY',
    LAT: -25.41,
    LON: -52.41,

    TEMP_BASE: 10,

    UPDATE_INTERVAL: 60000

};

let climateChart;

/* =========================================
   CLOCK
========================================= */

function updateClock(){

    document.getElementById('clock').innerText =
        new Date().toLocaleTimeString('pt-BR');

}

setInterval(updateClock,1000);

/* =========================================
   UTILIDADES
========================================= */

function safe(id,val){

    const el = document.getElementById(id);

    if(el){

        el.innerHTML = val;

    }

}

function calcDPV(temp,ur){

    const es =
        0.6108 *
        Math.exp((17.27 * temp) / (temp + 237.3));

    return es * (1 - (ur / 100));

}

function calcDew(temp,ur){

    return temp - ((100 - ur) / 5);

}

function calcET0(temp,ur,wind,solar){

    return (
        (
            0.408 * solar +
            (900 / (temp + 273)) *
            wind *
            (1 - ur/100)
        ) /
        (
            1 + 0.34 * wind
        )
    ).toFixed(2);

}

function calcGD(temp){

    return Math.max(
        0,
        temp - CONFIG.TEMP_BASE
    );

}

/* =========================================
   ALERTAS IA
========================================= */

function generateAIInsights(data){

    let insights = [];

    if(data.dpv > 2){

        insights.push(
            "⚠️ Alto risco de evaporação em pulverização"
        );

    }

    if(data.ur > 90){

        insights.push(
            "🦠 Alta favorabilidade para doenças fúngicas"
        );

    }

    if(data.wind > 15){

        insights.push(
            "🌬️ Risco elevado de deriva"
        );

    }

    if(data.temp > 32){

        insights.push(
            "🔥 Estresse térmico detectado"
        );

    }

    if(insights.length === 0){

        insights.push(
            "✅ Condições ambientais estáveis"
        );

    }

    return insights;

}

/* =========================================
   CHART
========================================= */

function initChart(){

    const ctx =
        document
            .getElementById('climateChart');

    climateChart = new Chart(ctx,{

        type:'line',

        data:{

            labels:[],

            datasets:[

                {
                    label:'Temperatura',
                    data:[],
                    borderColor:'#22c55e',
                    tension:.4
                },

                {
                    label:'Umidade',
                    data:[],
                    borderColor:'#38bdf8',
                    tension:.4
                },

                {
                    label:'DPV',
                    data:[],
                    borderColor:'#f59e0b',
                    tension:.4
                }

            ]

        },

        options:{

            responsive:true,

            maintainAspectRatio:false,

            plugins:{

                legend:{

                    labels:{
                        color:'#fff'
                    }

                }

            },

            scales:{

                x:{

                    ticks:{
                        color:'#9ca3af'
                    },

                    grid:{
                        color:'rgba(255,255,255,.05)'
                    }

                },

                y:{

                    ticks:{
                        color:'#9ca3af'
                    },

                    grid:{
                        color:'rgba(255,255,255,.05)'
                    }

                }

            }

        }

    });

}

/* =========================================
   UPDATE CHART
========================================= */

function updateChart(data){

    const time =
        new Date()
            .toLocaleTimeString('pt-BR');

    climateChart.data.labels.push(time);

    climateChart.data.datasets[0]
        .data.push(data.temp);

    climateChart.data.datasets[1]
        .data.push(data.ur);

    climateChart.data.datasets[2]
        .data.push(data.dpv);

    if(climateChart.data.labels.length > 20){

        climateChart.data.labels.shift();

        climateChart.data.datasets.forEach(ds => {

            ds.data.shift();

        });

    }

    climateChart.update();

}

/* =========================================
   TABELA HISTÓRICA
========================================= */

function updateTable(data){

    const table =
        document.querySelector('.table tbody');

    const row = `
        <tr>

            <td>
                ${new Date()
                    .toLocaleTimeString('pt-BR')}
            </td>

            <td>${data.temp}°C</td>

            <td>${data.ur}%</td>

            <td>${data.dpv}</td>

            <td>${data.et0}</td>

            <td>${data.par}</td>

            <td>${data.leaf}</td>

            <td>${data.disease}</td>

            <td>
                <span class="badge ${
                    data.spray
                        ? 'ok'
                        : 'stop'
                }">

                    ${
                        data.spray
                            ? 'OK'
                            : 'RISCO'
                    }

                </span>
            </td>

        </tr>
    `;

    table.innerHTML =
        row + table.innerHTML;

}

/* =========================================
   UPDATE DASHBOARD
========================================= */

async function updateDashboard(){

    try{

        /* ===============================
           DAVIS API
        =============================== */

        const davis =
            await fetch('/api/get-weather');

        const xmlText =
            await davis.text();

        const xml =
            new DOMParser()
                .parseFromString(
                    xmlText,
                    "text/xml"
                );

        const temp =
            parseFloat(
                xml.getElementsByTagName("temp_c")[0]
                    ?.textContent || 0
            );

        const ur =
            parseFloat(
                xml.getElementsByTagName("relative_humidity")[0]
                    ?.textContent || 0
            );

        const solar =
            parseFloat(
                xml.getElementsByTagName("solar_radiation")[0]
                    ?.textContent || 0
            );

        const pressure =
            parseFloat(
                xml.getElementsByTagName("pressure_mb")[0]
                    ?.textContent || 1013
            );

        /* ===============================
           OPEN WEATHER
        =============================== */

        const weather =
            await fetch(
                `https://api.openweathermap.org/data/2.5/weather?lat=${CONFIG.LAT}&lon=${CONFIG.LON}&appid=${CONFIG.API_KEY}&units=metric`
            );

        const w =
            await weather.json();

        /* ===============================
           AGROCALCULOS
        =============================== */

        const wind =
            (w.wind.speed * 3.6)
                .toFixed(1);

        const gust =
            (
                (w.wind.gust || 0) * 3.6
            ).toFixed(1);

        const dpv =
            calcDPV(temp,ur)
                .toFixed(2);

        const dew =
            calcDew(temp,ur)
                .toFixed(1);

        const et0 =
            calcET0(
                temp,
                ur,
                wind,
                solar
            );

        const gd =
            calcGD(temp)
                .toFixed(1);

        const deltaT =
            (temp - dew)
                .toFixed(1);

        const par =
            (solar * 2.1)
                .toFixed(0);

        /* ===============================
           EPIDEMIOLOGIA
        =============================== */

        const ferrugem =
            (
                ur > 80 &&
                temp > 18 &&
                temp < 26
            )
                ? 84
                : 22;

        const mofo =
            (
                ur > 85 &&
                temp < 22
            )
                ? 76
                : 18;

        const spray =
            (
                wind >= 3 &&
                wind <= 12 &&
                dpv <= 1.5
            );

        /* ===============================
           UI UPDATE
        =============================== */

        safe(
            'temp',
            `${temp.toFixed(1)}
             <span class="unit">°C</span>`
        );

        safe(
            'ur',
            `${ur}%`
        );

        safe(
            'dew',
            `${dew}°C`
        );

        safe(
            'press',
            `${pressure} hPa`
        );

        safe(
            'dpv',
            `${dpv} kPa`
        );

        safe(
            'wind',
            `${wind}
             <span class="unit">km/h</span>`
        );

        /* ===============================
           AI INSIGHTS
        =============================== */

        const insights =
            generateAIInsights({

                temp,
                ur,
                dpv,
                wind

            });

        const aiBox =
            document.getElementById(
                'ai-insights'
            );

        if(aiBox){

            aiBox.innerHTML =
                insights
                    .map(i => `
                        <div class="risk-box">
                            ${i}
                        </div>
                    `)
                    .join('');

        }

        /* ===============================
           UPDATE CHART
        =============================== */

        updateChart({

            temp,
            ur,
            dpv

        });

        /* ===============================
           UPDATE TABLE
        =============================== */

        updateTable({

            temp,
            ur,
            dpv,
            et0,
            par,
            leaf:'6.2h',
            disease:
                ferrugem > 50
                    ? 'Ferrugem'
                    : 'Baixo',

            spray

        });

        /* ===============================
           STATUS SPRAY
        =============================== */

        const sprayBox =
            document.querySelector('.status');

        if(sprayBox){

            sprayBox.className =
                spray
                    ? 'status good'
                    : 'status bad';

            sprayBox.innerHTML =
                spray
                    ? `
                        <i class="fa-solid fa-circle-check"></i>
                        PULVERIZAÇÃO RECOMENDADA
                      `
                    : `
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        PULVERIZAÇÃO NÃO RECOMENDADA
                      `;
        }

        console.log(
            'UFFS AgroClimate atualizado'
        );

    }catch(err){

        console.error(
            'Erro AgroClimate:',
            err
        );

    }

}

/* =========================================
   START
========================================= */

initChart();

updateDashboard();

setInterval(

    updateDashboard,

    CONFIG.UPDATE_INTERVAL

);

</script>
