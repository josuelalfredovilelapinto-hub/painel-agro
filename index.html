<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFFS | Agromet Engine v9.3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #030507; --card: #0a0d11; --border: #1f242c; --accent: #00d4ff; --agro: #2ea043; --warning: #f1e05a; --danger: #ff4444; --text: #e6edf3; --sub: #7d8590; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 11px; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; max-width: 1900px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 15px; }
        h2 { font-size: 10px; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; border-left: 3px solid var(--accent); padding-left: 10px; margin: 0 0 15px 0; }
        .metric-matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .metric-box { background: #12171f; padding: 12px; border-radius: 4px; border: 1px solid #1f242c; }
        .metric-box label { font-size: 8px; color: var(--sub); display: block; margin-bottom: 5px; text-transform: uppercase; }
        .metric-box span { font-size: 14px; font-weight: bold; color: #fff; }
        #spray_badge { padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 10px; }
        .table-wrap { max-height: 250px; overflow-y: auto; border: 1px solid var(--border); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th { background: #161b22; color: var(--accent); padding: 10px; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid #0d1117; text-align: center; }
        .btn-csv { background: var(--agro); color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<header style="display:flex; justify-content:space-between; align-items:center; padding: 15px; background: #0a0d11; border-bottom: 1px solid var(--border); margin-bottom: 15px;">
    <div>
        <h1 style="margin:0; font-size:1.4rem;">UFFS <span style="font-weight:200; color:var(--sub);">AGROMET v9.3</span></h1>
        <small id="status_io" style="color:var(--warning);"><i class="fa fa-sync"></i> AGUARDANDO DADOS...</small>
    </div>
    <div id="clock" style="font-size:1.5rem; font-weight:bold; color:var(--accent);">00:00:00</div>
</header>

<div class="grid">
    <div class="card" style="grid-column: span 12;" id="spray_card">
        <div style="display:flex; justify-content:space-between;">
            <h2><i class="fa fa-spray-can-sparkles"></i> Monitor de Pulverização</h2>
            <div id="spray_badge">ANALISANDO...</div>
        </div>
        <div class="metric-matrix" style="margin-top:10px;">
            <div class="metric-box"><label>Delta T</label><span id="s_dt">--</span></div>
            <div class="metric-box"><label>Vento</label><span id="s_wind">--</span></div>
            <div class="metric-box"><label>Inversão</label><span id="s_inv">--</span></div>
            <div class="metric-box"><label>Aviso</label><span id="s_msg" style="font-size:9px; color:var(--warning)">---</span></div>
        </div>
    </div>

    <div class="card" style="grid-column: span 12;">
        <h2><i class="fa fa-calculator"></i> Índices Calculados</h2>
        <div class="metric-matrix">
            <div class="metric-box"><label>Ponto Orvalho</label><span id="v_dew">--</span><small>°C</small></div>
            <div class="metric-box"><label>DPV Vapor</label><span id="v_dpv">--</span><small>kPa</small></div>
            <div class="metric-box"><label>ETo Dia</label><span id="v_eto">--</span><small>mm</small></div>
            <div class="metric-box"><label>Graus-Dia</label><span id="v_gd">--</span><small>GD</small></div>
            <div class="metric-box"><label>Horas Frio</label><span id="v_hf">0.0</span><small>HF</small></div>
        </div>
    </div>

    <div class="card" style="grid-column: span 12;">
        <h2><i class="fa fa-microchip"></i> Sensores em Tempo Real</h2>
        <div class="metric-matrix">
            <div class="metric-box"><label>Temperatura</label><span id="v_t">--</span>°C</div>
            <div class="metric-box"><label>Umidade</label><span id="v_ur">--</span>%</div>
            <div class="metric-box"><label>Pressão</label><span id="v_press">--</span>hPa</div>
            <div class="metric-box"><label>Vento</label><span id="v_w">--</span>km/h</div>
        </div>
    </div>

    <div class="card" style="grid-column: span 12;">
        <div style="display:flex; justify-content:space-between;">
            <h2><i class="fa fa-list"></i> Log de Dados</h2>
            <button class="btn-csv" onclick="exportCSV()">BAIXAR DATASET</button>
        </div>
        <div class="table-wrap">
            <table id="logTable">
                <thead><tr><th>Hora</th><th>Temp</th><th>UR%</th><th>Orvalho</th><th>ΔT</th><th>Vento</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_KEY = '45fd1e0698850bde1db1a8f3d3a3fa93';
    let totalHF = 0;

    async function updateSystem() {
        const statusIo = document.getElementById('status_io');
        try {
            const resDavis = await fetch('/api/get-weather').then(r => r.text());
            const xml = new DOMParser().parseFromString(resDavis, "text/xml");
            
            // Puxar dados base com "fallback" para zero se falhar
            const t = parseFloat(xml.getElementsByTagName("temp_c")[0]?.textContent || 0);
            const ur = parseFloat(xml.getElementsByTagName("relative_humidity")[0]?.textContent || 0);
            const rad = parseFloat(xml.getElementsByTagName("solar_radiation")[0]?.textContent || 0);
            const pressTag = xml.getElementsByTagName("pressure_mb")[0] || xml.getElementsByTagName("barometer")[0] || xml.getElementsByTagName("pressure_in")[0];
            const press = pressTag ? pressTag.textContent : "---";

            // OpenWeather para vento
            const resOWM = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=-25.41&lon=-52.41&appid=${API_KEY}&units=metric`).then(r => r.json());
            const wind = (resOWM.wind.speed * 3.6).toFixed(1);

            // CÁLCULOS INDIVIDUAIS (Se um falhar, o outro segue)
            const dew = (t - ((100 - ur) / 5)).toFixed(1);
            const dt = (t - dew).toFixed(1);
            const es = 0.6108 * Math.exp((17.27 * t) / (t + 237.3));
            const dpv = (es * (1 - (ur / 100))).toFixed(3);
            const eto = (0.0023 * (t + 17.8) * Math.sqrt(12) * (rad * 0.0864) / 2.45).toFixed(2);
            if (t <= 7.2) totalHF += (2/60);

            // ATUALIZAR TELA
            document.getElementById('v_t').innerText = t.toFixed(1);
            document.getElementById('v_ur').innerText = ur;
            document.getElementById('v_press').innerText = press;
            document.getElementById('v_w').innerText = wind;
            document.getElementById('v_dew').innerText = dew;
            document.getElementById('v_dpv').innerText = dpv;
            document.getElementById('v_eto').innerText = eto;
            document.getElementById('v_gd').innerText = Math.max(0, t - 10).toFixed(1);
            document.getElementById('v_hf').innerText = totalHF.toFixed(2);

            // LÓGICA PULVERIZAÇÃO
            const badge = document.getElementById('spray_badge');
            let st = "OK", msg = "Condições Ideais";
            if (dt < 2 || dt > 8) { st = "STOP"; msg = "ΔT Crítico"; }
            else if (wind < 3) { st = "ALERTA"; msg = "Inversão Térmica"; }
            else if (wind > 12) { st = "STOP"; msg = "Deriva Alta"; }

            badge.innerText = st;
            badge.style.background = st === "OK" ? "var(--agro)" : (st === "ALERTA" ? "var(--warning)" : "var(--danger)");
            document.getElementById('s_dt').innerText = dt;
            document.getElementById('s_wind').innerText = wind + " km/h";
            document.getElementById('s_inv').innerText = wind < 3 ? "ALTA" : "NULA";
            document.getElementById('s_msg').innerText = msg;

            // LOG
            const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.querySelector("#logTable tbody").insertAdjacentHTML('afterbegin', `<tr><td>${now}</td><td>${t}</td><td>${ur}%</td><td>${dew}</td><td>${dt}</td><td>${wind}</td></tr>`);

            statusIo.innerHTML = '<i class="fa fa-check-circle"></i> ONLINE';
            statusIo.style.color = 'var(--agro)';
        } catch (e) {
            console.error(e);
            statusIo.innerHTML = '<i class="fa fa-times-circle"></i> ERRO NO PROCESSAMENTO';
            statusIo.style.color = 'var(--danger)';
        }
    }

    function exportCSV() {
        let csv = "Hora,Temp,UR,Orvalho,DeltaT,Vento\n";
        document.querySelectorAll("#logTable tr").forEach(tr => {
            const row = Array.from(tr.querySelectorAll("td")).map(td => td.innerText).join(",");
            if(row) csv += row + "\n";
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'uffs_agromet.csv';
        a.click();
    }

    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    updateSystem();
    setInterval(updateSystem, 120000);
</script>
</body>
</html>
