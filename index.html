<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFFS | Agromet v10.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #05070a;
            --glass-card: rgba(13, 17, 23, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent: #00e5ff;
            --success: #00ff88;
            --warning: #f1e05a;
            --danger: #ff4d4d;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #05070a; color: var(--text-main); margin: 0; padding: 15px; font-size: 13px; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1800px; margin: 0 auto; }
        header { grid-column: span 4; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--glass-card); border: 1px solid var(--border-color); border-radius: 12px; }
        .card { background: var(--glass-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; }
        h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--accent); margin: 0 0 15px 0; border-bottom: 1px solid rgba(0,229,255,0.1); padding-bottom: 8px; }
        .sensor-box { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 10px; }
        .sensor-value { font-family: 'JetBrains Mono'; font-size: 1.2rem; font-weight: 700; color: #fff; }
        .table-scroll { max-height: 250px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; padding: 10px; font-size: 0.7rem; color: var(--text-sub); }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #1f242c; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div><h1>UFFS <span style="font-weight:200;">AGROMET ENGINE v10.5</span></h1></div>
        <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 1.5rem; color: var(--accent);">00:00:00</div>
    </header>

    <div class="card" style="grid-column: span 2;">
        <h2>Telemetria</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="sensor-box"><span style="color:var(--text-sub); font-size:0.6rem;">TEMP. AR</span><br><span class="sensor-value" id="v_t">--</span>°C</div>
            <div class="sensor-box"><span style="color:var(--text-sub); font-size:0.6rem;">UMIDADE</span><br><span class="sensor-value" id="v_ur">--</span>%</div>
            <div class="sensor-box"><span style="color:var(--text-sub); font-size:0.6rem;">CHUVA (mm/h)</span><br><span class="sensor-value" id="v_rain">--</span></div>
            <div class="sensor-box"><span style="color:var(--text-sub); font-size:0.6rem;">ETo (Hargreaves)</span><br><span class="sensor-value" id="v_eto">--</span></div>
        </div>
    </div>

    <div class="card" style="grid-column: span 2;">
        <h2>Status de Aplicação</h2>
        <div id="spray_msg" style="font-size:1.5rem; font-weight:800; padding:20px; text-align:center; border: 1px solid var(--border-color);">---</div>
    </div>

    <div class="card" style="grid-column: span 4;">
        <div style="display:flex; justify-content:space-between;">
            <h2>Log de Dados</h2>
            <button onclick="exportCSV()" style="background:var(--success); border:none; padding:5px 10px; cursor:pointer;">BAIXAR CSV</button>
        </div>
        <div class="table-scroll">
            <table id="logTable">
                <thead><tr><th>HORA</th><th>TEMP</th><th>UR%</th><th>CHUVA</th><th>ETo</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const URL_DAVIS = "https://api.weatherlink.com/v1/NoaaExt.xml?user=001D0AE08F6A&pass=Teste0&apiToken=743204D9EA424F04898A6B22CD797141";

    async function updateSystem() {
        try {
            const res = await fetch(URL_DAVIS);
            const xmlText = await res.text();
            const xml = new DOMParser().parseFromString(xmlText, "text/xml");

            const t = parseFloat(xml.getElementsByTagName("temp_c")[0].textContent);
            const ur = parseFloat(xml.getElementsByTagName("relative_humidity")[0].textContent);
            const rainInch = parseFloat(xml.getElementsByTagName("rain_rate_in_per_hr")[0].textContent);
            const rainMM = (rainInch * 25.4).toFixed(1);

            // Hargreaves-Samani Simplificado (ETo = 0.0023 * Ra * (Tmed + 17.8) * sqrt(Tmax-Tmin))
            // Como não temos Tmax/Tmin agora, usamos uma estimativa térmica constante para o cálculo
            const eto = (0.0023 * 18 * (t + 17.8) * Math.sqrt(8)).toFixed(3);

            document.getElementById('v_t').innerText = t;
            document.getElementById('v_ur').innerText = ur;
            document.getElementById('v_rain').innerText = rainMM;
            document.getElementById('v_eto').innerText = eto;

            // Lógica Spray
            const msg = document.getElementById('spray_msg');
            if (rainMM > 0) { msg.innerText = "PARAR: CHUVA"; msg.style.color = "var(--danger)"; }
            else if (ur < 50) { msg.innerText = "ATENÇÃO: BAIXA UMIDADE"; msg.style.color = "var(--warning)"; }
            else { msg.innerText = "CONDIÇÕES FAVORÁVEIS"; msg.style.color = "var(--success)"; }

            const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.querySelector("#logTable tbody").insertAdjacentHTML('afterbegin', 
                `<tr><td>${now}</td><td>${t}</td><td>${ur}</td><td>${rainMM}</td><td>${eto}</td></tr>`);
        } catch (e) { console.error("Erro na atualização", e); }
    }

    function exportCSV() {
        let csv = "Hora,Temp,UR,Chuva,ETo\n";
        document.querySelectorAll("#logTable tr").forEach(tr => {
            const row = Array.from(tr.querySelectorAll("td")).map(td => td.innerText).join(",");
            if(row) csv += row + "\n";
        });
        const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv); a.download = 'uffs_data.csv'; a.click();
    }

    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    updateSystem(); setInterval(updateSystem, 60000);
</script>
</body>
</html>
