<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>UFFS | Agromet v10.4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-body: #05070a; --glass-card: rgba(13, 17, 23, 0.85); --accent: #00e5ff; --sun: #ffaa00; --text-main: #f0f6fc; }
        body { font-family: 'Inter', sans-serif; background: #05070a; color: var(--text-main); margin: 20px; }
        .card { background: var(--glass-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .sensor-value { font-family: 'JetBrains Mono'; font-size: 1.5rem; font-weight: 700; display: block; }
        .sensor-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        th { color: #8b949e; font-size: 0.7rem; text-align: left; padding: 10px; }
        td { font-family: 'JetBrains Mono'; padding: 10px; border-bottom: 1px solid #161b22; }
    </style>
</head>
<body>

<div class="card">
    <h2><i class="fa fa-microchip"></i> Telemetria Atmosférica</h2>
    <div style="display:flex; gap:20px;">
        <div><span class="sensor-label">Temp.</span><span class="sensor-value" id="v_t">--</span></div>
        <div style="border-left: 1px solid var(--sun); padding-left: 20px;">
            <span class="sensor-label" style="color:var(--sun)">Radiação Solar</span>
            <span class="sensor-value" id="v_rad" style="color:var(--sun)">--</span>
        </div>
    </div>
</div>

<div class="card">
    <h2><i class="fa fa-database"></i> Log de Dados (Histórico)</h2>
    <table id="logTable">
        <thead><tr><th>HORA</th><th>TEMP</th><th>RADIAÇÃO</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const API_KEY = '45fd1e0698850bde1db1a8f3d3a3fa93';
    const URL_API = "SUA_URL_DO_WEB_APP_AQUI"; // <--- COLOQUE AQUI A URL DO SEU DO-GET

    async function updateSystem() {
        try {
            const resDavis = await fetch('/api/get-weather').then(r => r.text());
            const xml = new DOMParser().parseFromString(resDavis, "text/xml");
            
            // Lógica robusta para capturar radiação
            const tagsRad = ["solar_radiation", "solarrad", "solar", "rad"];
            let rad = 0;
            for (let tag of tagsRad) {
                let el = xml.getElementsByTagName(tag)[0];
                if (el) { rad = parseFloat(el.textContent); break; }
            }

            const t = parseFloat(xml.getElementsByTagName("temp_c")[0]?.textContent || 0);

            // Atualiza UI
            document.getElementById('v_t').innerText = t.toFixed(1) + "°C";
            document.getElementById('v_rad').innerText = rad + " W/m²";

            // Envia para o POST (sua planilha)
            fetch("SUA_URL_DO_POST_AQUI", { method: 'POST', mode: 'no-cors', body: JSON.stringify({ temp: t, rad: rad }) });

        } catch (e) { console.error("Erro na Davis", e); }
    }

    async function carregarHistorico() {
        try {
            const res = await fetch(URL_API);
            const data = await res.json();
            const tbody = document.querySelector("#logTable tbody");
            tbody.innerHTML = "";
            data.reverse().forEach(r => {
                tbody.insertAdjacentHTML('beforeend', `<tr><td>${r.hora}</td><td>${r.temp}°C</td><td>${r.rad} W/m²</td></tr>`);
            });
        } catch(e) { console.error("Erro ao ler planilha", e); }
    }

    setInterval(updateSystem, 60000);
    window.onload = () => { updateSystem(); carregarHistorico(); };
</script>
</body>
</html>
