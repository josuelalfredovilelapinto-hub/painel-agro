<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Agro UFFS-LS</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f3; color: #333; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; width: 250px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .alerta { padding: 15px; margin: 20px; border-radius: 10px; font-weight: bold; }
        .bom { background: #2ecc71; color: white; }
        .ruim { background: #e74c3c; color: white; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>

    <h1>Monitoramento Agromet - UFFS Laranjeiras</h1>
    <p id="data-hora">Carregando dados...</p>

    <div id="status-pulverizacao" class="alerta">Verificando Delta T...</div>

    <div class="container">
        <div class="card">
            <h3>Temperatura</h3>
            <h2 id="temp">--</h2>
        </div>
        <div class="card">
            <h3>Umidade</h3>
            <h2 id="hum">--</h2>
        </div>
        <div class="card">
            <h3>Vento</h3>
            <h2 id="vento">--</h2>
        </div>
        <div class="card">
            <h3>Ponto de Orvalho</h3>
            <h2 id="orvalho">--</h2>
        </div>
    </div>

    <div class="card" style="width: 80%; margin: auto;">
        <h3>Alerta Fitossanitário (Região LS)</h3>
        <p id="alerta-texto">Analisando risco de doenças...</p>
    </div>

    <script>
        async function buscarDados() {
            try {
                const response = await fetch('/api/get-weather');
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");

                // Pegando dados do XML
                const temp = parseFloat(xml.getElementsByTagName("temp_c")[0].textContent);
                const hum = parseFloat(xml.getElementsByTagName("relative_humidity")[0].textContent);
                const ventoKts = parseFloat(xml.getElementsByTagName("wind_kt")[0].textContent);
                const ventoKm = (ventoKts * 1.852).toFixed(1);
                const dataObj = xml.getElementsByTagName("observation_time")[0].textContent;

                // 1. Cálculo do Ponto de Orvalho (Simplificado)
                const orvalho = (temp - ((100 - hum) / 5)).toFixed(1);

                // 2. Cálculo Delta T (Importante para pulverização)
                // Delta T = Temp Seca - Temp Úmida. 
                // Uma aproximação rápida:
                const deltaT = (temp - orvalho).toFixed(1);

                // Exibir na tela
                document.getElementById('temp').innerText = temp + "°C";
                document.getElementById('hum').innerText = hum + "%";
                document.getElementById('vento').innerText = ventoKm + " km/h";
                document.getElementById('orvalho').innerText = orvalho + "°C";
                document.getElementById('data-hora').innerText = "Última leitura: " + dataObj;

                // Lógica de Pulverização
                const statusDiv = document.getElementById('status-pulverizacao');
                if (deltaT >= 2 && deltaT <= 8) {
                    statusDiv.innerText = "CONDIÇÃO IDEAL PARA PULVERIZAÇÃO (Delta T: " + deltaT + ")";
                    statusDiv.className = "alerta bom";
                } else {
                    statusDiv.innerText = "EVITAR PULVERIZAÇÃO (Delta T fora do ideal: " + deltaT + ")";
                    statusDiv.className = "alerta ruim";
                }

                // Alerta Fitossanitário Simples (Ex: Ferrugem Soja)
                const alertaTexto = document.getElementById('alerta-texto');
                if (hum > 85 && temp >= 18 && temp <= 24) {
                    alertaTexto.innerText = "ALERTA: Condições favoráveis para fungos (Alta umidade e temp. média).";
                    alertaTexto.style.color = "red";
                } else {
                    alertaTexto.innerText = "Baixo risco de doenças fúngicas nas últimas horas.";
                    alertaTexto.style.color = "green";
                }

            } catch (e) {
                console.error("Erro:", e);
            }
        }

        buscarDados();
        setInterval(buscarDados, 300000); // Atualiza a cada 5 min
    </script>
</body>
</html>
