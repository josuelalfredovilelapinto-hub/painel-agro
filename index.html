<script>

const API_KEY = '45fd1e0698850bde1db1a8f3d3a3fa93';

const LAT = -25.41;
const LON = -52.41;

const TB = 10;

/* =========================
   CLOCK
========================= */

setInterval(() => {

    document.getElementById('clock').innerText =
        new Date().toLocaleTimeString();

}, 1000);

/* =========================
   UPDATE
========================= */

async function updateUFFSDashboard() {

    try {

        /* =========================
           DAVIS/XML
        ========================= */

        const resDavis =
            await fetch('/api/get-weather');

        if (!resDavis.ok) {

            throw new Error('Erro API DAVIS');

        }

        const xmlText =
            await resDavis.text();

        const xml =
            new DOMParser()
                .parseFromString(
                    xmlText,
                    "text/xml"
                );

        const t =
            parseFloat(
                xml.getElementsByTagName("temp_c")[0]
                    ?.textContent || 0
            );

        const ur =
            parseFloat(
                xml.getElementsByTagName("relative_humidity")[0]
                    ?.textContent || 0
            );

        const solar =
            parseFloat(
                xml.getElementsByTagName("solar_radiation")[0]
                    ?.textContent || 0
            );

        const press =
            xml.getElementsByTagName("pressure_mb")[0]
                ?.textContent || "---";

        /* =========================
           OPENWEATHER
        ========================= */

        const resOWM =
            await fetch(
                `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&appid=${API_KEY}&units=metric`
            );

        const w =
            await resOWM.json();

        /* =========================
           CALCULOS
        ========================= */

        const es =
            0.6108 *
            Math.exp(
                (17.27 * t) /
                (t + 237.3)
            );

        const dpv =
            es *
            (1 - (ur / 100));

        const dew =
            t -
            ((100 - ur) / 5);

        const dt =
            t - dew;

        const hoje =
            new Date();

        const diaAno =
            Math.floor(
                (
                    hoje -
                    new Date(
                        hoje.getFullYear(),
                        0,
                        0
                    )
                ) / 86400000
            );

        const dec =
            23.45 *
            Math.sin(
                (360 / 365) *
                (diaAno - 80) *
                Math.PI / 180
            );

        const h =
            Math.acos(
                -Math.tan(
                    LAT * Math.PI / 180
                ) *
                Math.tan(
                    dec * Math.PI / 180
                )
            ) *
            180 / Math.PI;

        const fotohours =
            (2 / 15) * h;

        const wKm =
            (
                w.wind.speed * 3.6
            ).toFixed(1);

        const sprayOk =
            (
                wKm >= 3 &&
                wKm <= 12 &&
                dpv <= 1.5
            );

        /* =========================
           DOENÇAS
        ========================= */

        const leafWet =
            dt < 1.5;

        const riskFerVal =
            (
                leafWet &&
                t > 18 &&
                t < 26
            )
                ? 85
                : 15;

        const riskMofoVal =
            (
                t < 21 &&
                ur > 85
            )
                ? 90
                : 20;

        /* =========================
           UI
        ========================= */

        document.getElementById('t_ar')
            .innerHTML =
            `${t.toFixed(1)}
             <span class="unit">°C</span>`;

        document.getElementById('v_ur')
            .innerText =
            ur + "%";

        document.getElementById('v_dew')
            .innerText =
            dew.toFixed(1) + "°";

        document.getElementById('v_press')
            .innerText =
            press + " hPa";

        document.getElementById('v_dpv')
            .innerText =
            dpv.toFixed(2);

        document.getElementById('v_dt')
            .innerText =
            dt.toFixed(1);

        document.getElementById('w_spd')
            .innerHTML =
            `${wKm}
             <span class="unit">km/h</span>`;

        document.getElementById('w_dir')
            .innerText =
            w.wind.deg + "°";

        document.getElementById('w_gust')
            .innerText =
            (
                (w.wind.gust || 0) * 3.6
            ).toFixed(1);

        document.getElementById('v_foto')
            .innerHTML =
            `${Math.floor(fotohours)}h
             ${Math.round((fotohours % 1) * 60)}m`;

        document.getElementById('v_gd')
            .innerText =
            Math.max(
                0,
                t - TB
            ).toFixed(2);

        document.getElementById('v_rad')
            .innerText =
            solar;

        document.getElementById('v_uv')
            .innerText =
            w.uvi || "--";

        document.getElementById('v_par')
            .innerText =
            (solar * 2.1).toFixed(1);

        document.getElementById('v_leaf')
            .innerText =
            leafWet
                ? "MOLHADO"
                : "SECO";

        /* =========================
           SPRAY
        ========================= */

        const sBox =
            document.getElementById(
                'spray_alert'
            );

        sBox.innerText =
            sprayOk
                ? "PULVERIZAÇÃO RECOMENDADA"
                : "PULVERIZAÇÃO NÃO RECOMENDADA";

        sBox.style.background =
            sprayOk
                ? "var(--agro)"
                : "var(--danger)";

        document.getElementById('s_wind')
            .innerText =
            wKm + " km/h";

        document.getElementById('s_evap')
            .innerText =
            dpv > 1.2
                ? "ALTA"
                : "BAIXA";

        /* =========================
           FERRUGEM
        ========================= */

        const ferBox =
            document.getElementById(
                'risk_fer'
            );

        ferBox.className =
            "pathogen-risk " +
            (
                riskFerVal > 50
                    ? "risk-high"
                    : "risk-ideal"
            );

        document.getElementById(
            'risk_fer_val'
        ).innerText =
            riskFerVal + "%";

        document.getElementById(
            'risk_fer_msg'
        ).innerText =
            riskFerVal > 50
                ? "Risco de Infecção"
                : "Condição Inóspita";

        /* =========================
           MOFO
        ========================= */

        const mofoBox =
            document.getElementById(
                'risk_mofo'
            );

        mofoBox.className =
            "pathogen-risk " +
            (
                riskMofoVal > 50
                    ? "risk-high"
                    : "risk-ideal"
            );

        document.getElementById(
            'risk_mofo_val'
        ).innerText =
            riskMofoVal + "%";

        document.getElementById(
            'risk_mofo_msg'
        ).innerText =
            riskMofoVal > 50
                ? "Alta Favorabilidade"
                : "Baixa Favorabilidade";

        /* =========================
           TABELA
        ========================= */

        const table =
            document.querySelector(
                "#main_table tbody"
            );

        const row =
            `
            <tr>

                <td>
                    ${hoje.toLocaleTimeString()}
                </td>

                <td>${t.toFixed(1)}°</td>

                <td>${ur}%</td>

                <td>${dpv.toFixed(2)}</td>

                <td>${wKm}</td>

                <td>${solar}</td>

                <td>${(t - TB).toFixed(1)}</td>

                <td>${(solar * 2.1).toFixed(0)}</td>

                <td style="
                    color:
                    ${
                        sprayOk
                            ? 'var(--agro)'
                            : 'var(--danger)'
                    }
                ">
                    ${
                        sprayOk
                            ? 'OK'
                            : 'STOP'
                    }
                </td>

            </tr>
            `;

        table.innerHTML =
            row + table.innerHTML;

        /* =========================
           LIMITA TABELA
        ========================= */

        while (table.rows.length > 20) {

            table.deleteRow(20);

        }

    }

    catch (e) {

        console.error(
            "Falha no SAD Agro:",
            e
        );

    }

}

/* =========================
   START
========================= */

updateUFFSDashboard();

setInterval(
    updateUFFSDashboard,
    300000
);

</script>
